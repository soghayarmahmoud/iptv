org.gradle.jvmargs=-Xmx4G
org.gradle.parallel=true
org.gradle.caching=true
kotlin.incremental=false
kotlin.incremental.java=false
android.useAndroidX=true
android.enableJetifier=true

# TV BOX OPTIMIZATION - Disable unused features to reduce memory footprint
# These settings help apps run on low-end devices (1-2GB RAM)
android.defaults.buildfeatures.compose=false
android.defaults.buildfeatures.aidl=false
android.defaults.buildfeatures.renderscript=false
android.defaults.buildfeatures.resvalues=false
android.defaults.buildfeatures.shaders=false

# Optimize Kotlin compilation for TV boxes
kotlin.compiler.execution.strategy=in-process

