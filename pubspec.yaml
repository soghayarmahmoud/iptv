name: iptv
description: "IPTV streaming application built with Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

# Core Flutter framework
dependencies:
  animated_snack_bar: ^0.4.0
  bloc: ^9.0.1
  cached_network_image: ^3.4.1
  change_app_package_name: ^1.5.0
  chewie: ^1.7.5
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  device_info_plus: ^10.1.2
  device_preview: ^1.3.1
  dio: ^5.9.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.4
  flutter_secure_storage: ^9.2.4
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4 # For iOS/Android native libraries
  geocoding: ^2.1.1
  geolocator: ^12.0.0
  get: ^4.7.2
  iconly: ^1.0.1
  intl: ^0.20.2
  modal_progress_hud_nsn: ^0.5.1
  shared_preferences: ^2.5.3
  skeletonizer: ^2.1.0+1
  video_player: ^2.9.2

# Development dependencies
dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ic_launcher.png"
  adaptive_icon_background: "#020817"
  adaptive_icon_foreground: "assets/images/ic_launcher.png"
  remove_alpha_ios: true # Add this line

# Flutter configuration
flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/

  # Custom fonts
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
    - family: Alexandria
      fonts:
        - asset: assets/fonts/Alexandria-Light.ttf
          weight: 300
        - asset: assets/fonts/Alexandria-SemiBold.ttf
          weight: 600

# Asset generation
flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/utils/
  filename: app_images.dart
  field_prefix: null

# App icon generation
# Native splash screen
flutter_native_splash:
  image: assets/images/logo.png

  color: "#020817"
  android_12:
    icon_background_color: "#020817"
    icon_background_color_dark: "#020817"
flutter_intl:
  enabled: true
